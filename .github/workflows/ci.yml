name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      release:
        description: "Create release: push images, create git tag, and publish GitHub release"
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKERHUB_REPOSITORY: thedude459/open-garden

jobs:
  precommit-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install lint dependencies
        run: |
          pip install -r backend/requirements-dev.txt
          npm --prefix frontend ci

      - name: Run pre-commit lint suite
        run: pre-commit run --all-files

  backend-unit-tests:
    needs: [precommit-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      RANDOMLY_SEED: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore pip cache for backend test containers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-backend-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-pip-

      - name: Run backend unit tests
        run: ./scripts/test-backend-unit.sh

      - name: Publish backend unit coverage summary
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("backend/coverage-unit.xml").getroot()
          line_pct = float(root.attrib["line-rate"]) * 100
          branch_pct = float(root.attrib["branch-rate"]) * 100

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Backend Unit Coverage\n\n")
              summary.write(f"- Line coverage: {line_pct:.2f}%\n")
              summary.write(f"- Branch coverage: {branch_pct:.2f}%\n")
              summary.write("- Coverage XML: backend/coverage-unit.xml\n")
          PY

      - name: Publish unit randomization seed
        run: |
          {
            echo "## Backend Unit Tests"
            echo
            echo "- pytest-randomly seed: ${RANDOMLY_SEED}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend unit coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-unit-coverage-report
          path: backend/coverage-unit.xml
          retention-days: 7

  backend-integration-tests:
    needs: [precommit-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      RANDOMLY_SEED: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore pip cache for backend test containers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-backend-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-pip-

      - name: Run backend integration tests
        run: ./scripts/test-backend-integration.sh

      - name: Publish backend integration coverage summary
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("backend/coverage-integration.xml").getroot()
          line_pct = float(root.attrib["line-rate"]) * 100
          branch_pct = float(root.attrib["branch-rate"]) * 100

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Backend Integration Coverage\n\n")
              summary.write(f"- Line coverage: {line_pct:.2f}%\n")
              summary.write(f"- Branch coverage: {branch_pct:.2f}%\n")
              summary.write("- Coverage XML: backend/coverage-integration.xml\n")
          PY

      - name: Publish integration randomization seed
        run: |
          {
            echo "## Backend Integration Tests"
            echo
            echo "- pytest-randomly seed: ${RANDOMLY_SEED}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend integration coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-integration-coverage-report
          path: backend/coverage-integration.xml
          retention-days: 7

  backend-coverage-gate:
    needs: [backend-unit-tests, backend-integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RANDOMLY_SEED: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Restore pip cache for backend test containers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-backend-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-pip-

      - name: Run backend tests with coverage gate
        run: ./scripts/test-backend.sh

      - name: Publish backend coverage summary
        run: |
          line_rate="$(grep -o 'line-rate="[0-9.]*"' backend/coverage.xml | head -n1 | cut -d'"' -f2)"
          branch_rate="$(grep -o 'branch-rate="[0-9.]*"' backend/coverage.xml | head -n1 | cut -d'"' -f2)"
          coverage_pct="$(awk "BEGIN {printf \"%.2f\", ${line_rate} * 100}")"
          branch_pct="$(awk "BEGIN {printf \"%.2f\", ${branch_rate} * 100}")"
          {
            echo "## Backend Coverage"
            echo
            echo "- Total line coverage: ${coverage_pct}%"
            echo "- Total branch coverage: ${branch_pct}%"
            echo "- Coverage XML: backend/coverage.xml"
            echo "- Coverage HTML: backend/htmlcov/index.html"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-coverage-report
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 7

  backend-tests-postgres:
    needs: [precommit-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opengarden
          POSTGRES_PASSWORD: opengarden
          POSTGRES_DB: opengarden_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U opengarden -d opengarden_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg2://opengarden:opengarden@localhost:5432/opengarden_ci
      SECRET_KEY: ci-only-not-for-production-use-replace-me
      PYTHONPATH: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect backend-related changes
        id: postgres_scope
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend_ci:
              - 'backend/**'
              - 'scripts/test-backend*.sh'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'

      - name: Skip Postgres smoke tests when backend is unchanged
        if: ${{ github.event_name != 'workflow_dispatch' && steps.postgres_scope.outputs.backend_ci != 'true' }}
        run: |
          {
            echo "## Backend Postgres Smoke Tests"
            echo
            echo "- Skipped: no backend-related file changes detected."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        if: ${{ github.event_name == 'workflow_dispatch' || steps.postgres_scope.outputs.backend_ci == 'true' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.postgres_scope.outputs.backend_ci == 'true' }}
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-randomly==3.16.0

      - name: Run Postgres-backed backend smoke tests
        if: ${{ github.event_name == 'workflow_dispatch' || steps.postgres_scope.outputs.backend_ci == 'true' }}
        run: |
          pytest \
            backend/tests/test_main_app_integration.py \
            backend/tests/test_migrations_smoke.py \
            backend/tests/test_postgres_smoke.py \
            --maxfail=1 \
            -o addopts="" \
            --junitxml=backend/test-results/backend-postgres-smoke.junit.xml \
            --randomly-seed="${{ github.run_number }}" \
            -q

      - name: Upload backend Postgres smoke JUnit report
        if: ${{ always() && (github.event_name == 'workflow_dispatch' || steps.postgres_scope.outputs.backend_ci == 'true') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-postgres-junit-report
          path: backend/test-results/backend-postgres-smoke.junit.xml
          if-no-files-found: warn
          retention-days: 7

  frontend-tests:
    needs: [precommit-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npm run test:unit:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    needs: [backend-unit-tests, backend-integration-tests, backend-coverage-gate, backend-tests-postgres, frontend-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Set up environment
        run: |
          cp .env.example .env
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-only-not-for-production-use-replace-me/' .env

      - name: Start app
        run: ./scripts/up.sh

      - name: Wait for API
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is ready."
              break
            fi
            echo "Attempt $i: API not ready yet, retrying in 3s..."
            sleep 3
          done
          curl -sf http://localhost:8000/health

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5173 > /dev/null; then
              echo "Frontend is ready."
              break
            fi
            echo "Attempt $i: Frontend not ready yet, retrying in 3s..."
            sleep 3
          done
          curl -sf http://localhost:5173 > /dev/null

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8000
          CI: "true"

      - name: Upload Playwright results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

      - name: Stop containers
        if: always()
        run: |
          set -a
          source .env
          set +a
          if [[ -n "${DATABASE_URL:-}" ]]; then
            docker compose down -v --remove-orphans
          else
            docker compose -f docker-compose.yml -f docker-compose.localdb.yml down -v --remove-orphans
          fi

  docker-images:
    name: Build and Publish Docker Images
    needs: [backend-unit-tests, backend-integration-tests, backend-coverage-gate, backend-tests-postgres, frontend-tests, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: prod
    outputs:
      should_release: ${{ steps.release_flags.outputs.should_release }}
      release_tag: ${{ steps.release_flags.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect changed service paths
        id: changes
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            api:
              - 'backend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            web:
              - 'frontend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'

      - name: Resolve release flags
        id: release_flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT: ${{ github.event.inputs.release || 'false' }}
        run: |
          should_release=false
          release_tag=

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$RELEASE_INPUT" == "true" ]]; then
            should_release=true
            release_tag="v$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}"
          fi

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        if: ${{ steps.release_flags.outputs.should_release == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: thedude459
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta_api
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=sha,prefix=api-
            type=raw,value=api-latest,enable={{is_default_branch}}
            type=raw,value=api-${{ steps.release_flags.outputs.release_tag }},enable=${{ steps.release_flags.outputs.should_release == 'true' }}

      - name: Build and optionally push API image
        if: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.api == 'true' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ steps.release_flags.outputs.should_release == 'true' }}
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Docker metadata (web)
        id: meta_web
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY }}
          tags: |
            type=sha,prefix=web-
            type=raw,value=web-latest,enable={{is_default_branch}}
            type=raw,value=web-${{ steps.release_flags.outputs.release_tag }},enable=${{ steps.release_flags.outputs.should_release == 'true' }}

      - name: Build and optionally push Web image
        if: ${{ github.event_name == 'workflow_dispatch' || steps.changes.outputs.web == 'true' }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ steps.release_flags.outputs.should_release == 'true' }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  release:
    name: Create Tag and GitHub Release
    needs: [docker-images]
    if: ${{ needs.docker-images.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
    steps:
      - name: Create git tag and GitHub release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ needs.docker-images.outputs.release_tag }}
          DOCKER_REPO: ${{ env.DOCKERHUB_REPOSITORY }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetSha = context.sha;
            const tag = process.env.RELEASE_TAG;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: targetSha,
            });

            const body = [
              `Docker images published to ${process.env.DOCKER_REPO}.`,
              '',
              'Release images:',
              `- ${process.env.DOCKER_REPO}:api-${tag}`,
              `- ${process.env.DOCKER_REPO}:web-${tag}`,
            ].join('\n');

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: targetSha,
              name: `Release ${tag}`,
              body,
              generate_release_notes: true,
            });
