databases:
  - name: open-garden-db
    databaseName: opengarden
    user: opengarden
    plan: free

services:
  - type: web
    name: open-garden-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: open-garden-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FRONTEND_BASE_URL
        value: https://open-garden-web.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://open-garden-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: noreply@example.com
      - key: SMTP_USE_TLS
        value: "true"
      - key: GLOBAL_RATE_LIMIT_PER_MINUTE
        value: "180"
      - key: AUTH_LOGIN_LIMIT_PER_MINUTE
        value: "5"
      - key: AUTH_REGISTER_LIMIT_PER_MINUTE
        value: "5"
      - key: AUTH_VERIFY_LIMIT_PER_MINUTE
        value: "20"
      - key: AUTH_RESET_LIMIT_PER_MINUTE
        value: "10"
      - key: AUTH_FORGOT_LIMIT_PER_HOUR
        value: "8"
      - key: AUTH_RESEND_LIMIT_PER_HOUR
        value: "12"

  - type: static
    name: open-garden-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://open-garden-api.onrender.com