repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff-check
        name: Backend Ruff check
        files: ^backend/(app|tests)/.*\.py$
        args: ["backend/app", "backend/tests"]
      - id: ruff-format
        name: Backend Ruff format check
        files: ^backend/(app|tests)/.*\.py$
        args: ["--check", "backend/app", "backend/tests"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: YAML lint
        args: ["-c", ".yamllint.yml"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        name: Docs markdown lint
        args: ["--config", ".markdownlint-cli2.jsonc"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: Docs markdown spelling
        files: \.md$
        exclude: ^\.github/(skills|instructions)/
        args: ["--check-filenames", "--check-hidden"]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: Frontend ESLint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
