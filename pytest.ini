[pytest]
pythonpath = backend
testpaths = backend/tests
markers =
	real_email: exercises the real SMTP helper instead of the default email stub
filterwarnings =
	ignore:datetime.datetime.utcnow\(\) is deprecated and scheduled for removal.*:DeprecationWarning:jose.jwt
addopts = --cov=app --cov-report=term-missing --cov-report=xml:backend/coverage.xml --cov-report=html:backend/htmlcov --cov-fail-under=90