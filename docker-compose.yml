services:
  api:
    build:
      context: ./backend
    container_name: open-garden-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    container_name: open-garden-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"

