name: Sync Plants Cron

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/internal/sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
