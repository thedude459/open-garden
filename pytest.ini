[pytest]
pythonpath = backend
testpaths = backend/tests
markers =
	real_email: exercises the real SMTP helper instead of the default email stub
	integration: end-to-end API integration tests that exercise multiple routers/workflows
	unit: focused unit-style tests for isolated modules or endpoints
filterwarnings =
	ignore:datetime.datetime.utcnow\(\) is deprecated and scheduled for removal.*:DeprecationWarning:jose.jwt
addopts = --strict-markers --cov=app --cov-branch --cov-report=term-missing --cov-report=xml:backend/coverage.xml --cov-report=html:backend/htmlcov --cov-fail-under=90