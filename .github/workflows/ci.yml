name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast static checks — no Docker required, runs in parallel with e2e.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Frontend typecheck
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit

      - name: Backend import check
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - name: Verify backend imports cleanly
        run: cd backend && python -c "from app.main import app; print('Backend import OK')"
        env:
          DATABASE_URL: "postgresql+psycopg2://user:pass@localhost/db"
          SECRET_KEY: "ci-check-only-not-for-production"
          ALLOWED_ORIGINS: "http://localhost:5173"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cp .env.example .env
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-only-not-for-production-use-replace-me/' .env

      - name: Start app
        run: ./scripts/up.sh

      - name: Wait for API
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is ready."
              break
            fi
            echo "Attempt $i: API not ready yet, retrying in 3s..."
            sleep 3
          done
          curl -sf http://localhost:8000/health

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5173 > /dev/null; then
              echo "Frontend is ready."
              break
            fi
            echo "Attempt $i: Frontend not ready yet, retrying in 3s..."
            sleep 3
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8000
          CI: "true"

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
