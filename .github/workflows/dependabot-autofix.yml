name: Dependabot pre-commit autofix

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: dependabot-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  autofix:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install lint dependencies
        run: |
          pip install -r backend/requirements-dev.txt
          npm --prefix frontend ci

      - name: Apply pre-commit autofixes
        run: |
          # Hooks may rewrite files (exit 1); we commit those fixes in the next step.
          pre-commit run --all-files || true

      - name: Commit and push lint fixes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No lint fixes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply pre-commit autofixes"
          git push
